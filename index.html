<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>VBT 專業監控</title>
<link rel="manifest" href="manifest.json">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
  :root {
    --bg-color: #000000; --card-bg: #1A1A1A; --primary: #FF5200; --success: #00FF00; --info: #00E5FF; --warning: #FFD600; --text-main: #FFFFFF; --text-dim: #888888;
  }
  body { font-family: sans-serif; text-align: center; background: var(--bg-color); color: var(--text-main); margin: 0; padding: 10px; }
  .header { display: flex; justify-content: space-between; align-items: center; padding: 15px; background: var(--card-bg); border-bottom: 3px solid var(--primary); margin-bottom: 10px; }
  .title { margin: 0; font-size: 1.2rem; font-weight: 900; color: var(--primary); }
  .stat-card { background: var(--card-bg); padding: 15px; border-radius: 12px; border: 1px solid #333; margin-bottom: 8px; }
  .stat-label { font-size: 0.8rem; color: var(--text-dim); display: block; margin-bottom: 5px; }
  .stat-val { font-size: 2.2rem; font-weight: 900; line-height: 1; }
  .sub-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .chart-container { background: var(--card-bg); margin-top: 10px; padding: 10px; border-radius: 12px; height: 200px; }
  button { font-size: 1rem; padding: 12px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; }
  #connectBtn { background: var(--primary); color: white; width: 100%; margin-bottom: 10px; }
  #connectBtn.connected { background: #222; color: var(--success); }
  
  /* 備註與儲存區 */
  .save-panel { background: var(--card-bg); padding: 15px; border-radius: 12px; margin-top: 15px; border: 1px solid #333; }
  #setNote { width: 100%; padding: 10px; background: #000; border: 1px solid #444; color: #fff; border-radius: 5px; margin-bottom: 10px; box-sizing: border-box; }
  #saveBtn { background: var(--success); color: #000; width: 100%; }
  
  .history-item { background: var(--card-bg); padding: 15px; border-radius: 10px; margin-bottom: 10px; border-left: 4px solid var(--primary); text-align: left; }
  .history-summary { display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
  .history-detail { display: none; margin-top: 10px; border-top: 1px solid #333; padding-top: 10px; }
  .history-detail.open { display: block; }
  #status { font-size: 0.7rem; color: #666; margin-bottom: 5px; }
</style>
</head>
<body>
  <div class="header">
    <span class="title">VBT 專業監控</span>
    <button id="resetBtn" style="background:#333; color:#fff; font-size:0.8rem;">開啟新組數</button>
  </div>

  <button id="connectBtn">開始連線感測器</button>
  <div id="status">尚未連線</div>

  <div class="stat-card">
    <span class="stat-label">完成次數</span>
    <span id="repsText" class="stat-val" style="color: var(--warning);">0</span>
  </div>

  <div class="sub-stats">
    <div class="stat-card"><span class="stat-label">平均速度</span><span id="avgText" class="stat-val" style="color: var(--success);">--</span></div>
    <div class="stat-card"><span class="stat-label">峰值速度</span><span id="peakText" class="stat-val" style="color: var(--info);">--</span></div>
  </div>

  <div class="chart-container">
    <canvas id="liveChart"></canvas>
  </div>

  <div class="save-panel">
    <input type="text" id="setNote" placeholder="點此輸入備註 (例如: 深蹲 60kg)">
    <div style="display:flex; gap:10px;">
      <button id="saveBtn">儲存本組數據</button>
      <button id="exportBtn" style="background:#333; color:var(--info); flex:0.5;">匯出 CSV</button>
    </div>
  </div>

  <div style="margin-top:25px; text-align:left;">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
      <span style="font-weight: bold; color: var(--warning); font-size: 1.1rem;">歷史訓練紀錄</span>
      <button id="clearBtn" style="background:none; color:#f44336; font-size:0.8rem;">全部刪除</button>
    </div>
    <div id="historyList"></div>
  </div>

<script>
const SERVICE_UUID = "19b10000-e8f2-537e-4f6c-d104768a1214";
const CHAR_UUID = "19b10001-e8f2-537e-4f6c-d104768a1214";

let gravity = 1.0, velocity = 0.0, maxVelocity = 0.0, velocities = [];
let state = 0, startTime = 0, calibBuffer = [], isCalibrated = false;
let currentSetData = [];
let lowVelocityCount = 0; // 緩衝計數器

const liveCtx = document.getElementById('liveChart').getContext('2d');
const liveChart = new Chart(liveCtx, {
    type: 'line',
    data: { labels: [], datasets: [
        { label: '平均', data: [], borderColor: '#00FF00', borderWidth: 3, tension: 0.2, fill: false },
        { label: '峰值', data: [], borderColor: '#00E5FF', borderWidth: 3, tension: 0.2, fill: false }
    ]},
    options: { responsive: true, maintainAspectRatio: false, scales: { y: { beginAtZero: true, grid: { color: '#222' } }, x: { display: false } }, plugins: { legend: { display: false } } }
});

function updateVBT(rawZ) {
    if (!isCalibrated) {
        calibBuffer.push(rawZ);
        if (calibBuffer.length >= 100) {
            gravity = calibBuffer.reduce((a, b) => a + b, 0) / calibBuffer.length;
            isCalibrated = true;
            document.getElementById('status').innerText = '狀態：校準完成';
        }
        return null;
    }

    let netAccel = rawZ - gravity;
    if (Math.abs(netAccel) < 0.06) { // 稍微降低噪聲門檻提高靈敏度
        netAccel = 0.0;
        if (state === 0) { velocity = 0.0; gravity = gravity * 0.95 + rawZ * 0.05; return null; }
    }

    velocity += netAccel * 9.81 * 0.01;

    if (state === 0) {
        if (Math.abs(netAccel) > 0.12) { // 降低啟動門檻，防止漏抓
            state = 1; startTime = Date.now(); velocities = []; maxVelocity = 0.0; lowVelocityCount = 0;
        } else { velocity = 0.0; }
    } else if (state === 1) {
        if (velocity > 0.10) state = 2; // 提早進入向心監控
        else if (Date.now() - startTime > 800) { state = 0; velocity = 0.0; }
    } else if (state === 2) {
        if (velocity > 0) {
            velocities.push(velocity);
            if (velocity > maxVelocity) maxVelocity = velocity;
            lowVelocityCount = 0; // 有速度時重置緩衝
        } else {
            lowVelocityCount++; // 進入負速或停頓
        }
        
        // 結束判斷優化：速度低於 0.08 且持續 15 幀 (0.15秒) 才算結束
        if ((velocity < 0.08 && velocities.length > 15 && lowVelocityCount > 15) || (Date.now() - startTime > 8000)) {
            state = 3;
        }
    } else if (state === 3) {
        let res = null;
        if (velocities.length > 15 && maxVelocity > 0.20) {
            res = {avg: velocities.reduce((a, b) => a + b, 0) / velocities.length, peak: maxVelocity};
        }
        state = 0; velocity = 0.0; return res;
    }
    return null;
}

function addRepToUI(res) {
    currentSetData.push(res);
    document.getElementById('avgText').innerText = res.avg.toFixed(2);
    document.getElementById('peakText').innerText = res.peak.toFixed(2);
    document.getElementById('repsText').innerText = currentSetData.length;
    liveChart.data.labels.push(currentSetData.length);
    liveChart.data.datasets[0].data.push(res.avg.toFixed(2));
    liveChart.data.datasets[1].data.push(res.peak.toFixed(2));
    liveChart.update();
}

function renderHistory() {
    const history = JSON.parse(localStorage.getItem('vbt_history') || '[]');
    const container = document.getElementById('historyList');
    container.innerHTML = '';
    history.forEach((set, index) => {
        const item = document.createElement('div');
        item.className = 'history-item';
        const mcvSet = (set.data.reduce((a, b) => a + b.avg, 0) / set.reps).toFixed(2);
        item.innerHTML = `
            <div class="history-summary" onclick="toggleHistory(${index})">
                <div style="flex:1;">
                    <div style="font-weight:bold; font-size:0.9rem; color:var(--primary);">${set.date}</div>
                    <div style="font-size:0.85rem; color:#fff; margin:3px 0;">${set.note || '無備註'}</div>
                    <div style="font-size:0.75rem; color:#888;">${set.reps} 下 | 平均 ${mcvSet} m/s</div>
                </div>
                <div style="display:flex; align-items:center; gap:10px;">
                    <span onclick="deleteHistory(event, ${index})" style="color:#f44336; font-size:0.75rem;">刪除</span>
                    <div style="color:var(--primary); font-size:0.6rem;">▼</div>
                </div>
            </div>
            <div id="detail-${index}" class="history-detail">
                <div style="width:100%; height:150px;"><canvas id="chart-${index}"></canvas></div>
            </div>
        `;
        container.appendChild(item);
        setTimeout(() => createHistoryChart(index, set.data), 50);
    });
}

function createHistoryChart(index, data) {
    const canvas = document.getElementById(`chart-${index}`);
    if (!canvas) return;
    new Chart(canvas.getContext('2d'), {
        type: 'line',
        data: {
            labels: data.map((_, i) => i + 1),
            datasets: [
                { data: data.map(d => d.avg.toFixed(2)), borderColor: '#00FF00', borderWidth: 2, pointRadius: 2, fill: false },
                { data: data.map(d => d.peak.toFixed(2)), borderColor: '#00E5FF', borderWidth: 2, pointRadius: 2, fill: false }
            ]
        },
        options: { responsive: true, maintainAspectRatio: false, scales: { y: { beginAtZero: true }, x: { display: true } }, plugins: { legend: { display: false } } }
    });
}

window.toggleHistory = (index) => { document.getElementById(`detail-${index}`).classList.toggle('open'); };

window.deleteHistory = (event, index) => {
    event.stopPropagation();
    if(confirm('確定刪除這組紀錄？')) {
        const history = JSON.parse(localStorage.getItem('vbt_history') || '[]');
        history.splice(index, 1);
        localStorage.setItem('vbt_history', JSON.stringify(history));
        renderHistory();
    }
};

document.getElementById('saveBtn').addEventListener('click', () => {
    if (currentSetData.length === 0) return;
    const note = document.getElementById('setNote').value;
    const history = JSON.parse(localStorage.getItem('vbt_history') || '[]');
    history.unshift({ 
        date: new Date().toLocaleString('zh-TW'), 
        reps: currentSetData.length, 
        note: note,
        data: [...currentSetData] 
    });
    localStorage.setItem('vbt_history', JSON.stringify(history.slice(0, 30)));
    document.getElementById('setNote').value = ''; // 清空輸入框
    renderHistory();
    alert('儲存成功！');
});

document.getElementById('resetBtn').addEventListener('click', () => {
    currentSetData = [];
    document.getElementById('avgText').innerText = "--";
    document.getElementById('peakText').innerText = "--";
    document.getElementById('repsText').innerText = "0";
    liveChart.data.labels = []; liveChart.data.datasets.forEach(d => d.data = []); liveChart.update();
    document.getElementById('status').innerText = '狀態：新組數已開啟';
});

document.getElementById('exportBtn').addEventListener('click', () => {
    const history = JSON.parse(localStorage.getItem('vbt_history') || '[]');
    if (history.length === 0) return;
    let csv = "\uFEFF日期,備註,次數,平均速度,峰值速度\n";
    history.forEach(set => {
        set.data.forEach((rep, index) => {
            csv += `${set.date},${set.note || ''},${index+1},${rep.avg.toFixed(2)},${rep.peak.toFixed(2)}\n`;
        });
    });
    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    const link = document.createElement("a");
    link.href = URL.createObjectURL(blob);
    link.download = `VBT_訓練紀錄_${Date.now()}.csv`;
    link.click();
});

document.getElementById('clearBtn').addEventListener('click', () => { if(confirm('全部清空歷史？')) { localStorage.removeItem('vbt_history'); renderHistory(); } });

document.getElementById('connectBtn').addEventListener('click', async () => {
    const btn = document.getElementById('connectBtn');
    try {
        const device = await navigator.bluetooth.requestDevice({ filters: [{ name: 'Nano33_Motion' }], optionalServices: [SERVICE_UUID] });
        const server = await device.gatt.connect();
        const service = await server.getPrimaryService(SERVICE_UUID);
        const characteristic = await service.getCharacteristic(CHAR_UUID);
        await characteristic.startNotifications();
        btn.classList.add('connected'); btn.innerText = '感測器已連線';
        characteristic.addEventListener('characteristicvaluechanged', (e) => {
            let res = updateVBT(parseFloat(new TextDecoder().decode(e.target.value).split(',')[2]));
            if (res) addRepToUI(res);
        });
    } catch (e) { alert('連線失敗：' + e); }
});

renderHistory();
</script>
</body>
</html>
