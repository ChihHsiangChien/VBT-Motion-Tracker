<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>VBT Pro v3.2 Wave Persistence</title>
<link rel="manifest" href="manifest.json">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
  :root { --bg-color: #000000; --panel-bg: #FFFFFF; --primary: #FF5200; --success: #008000; --info: #0000FF; --warning: #FF8F00; --text-dark: #000000; --text-light: #FFFFFF; }
  body { font-family: -apple-system, sans-serif; background: var(--bg-color); color: var(--text-light); margin: 0; padding: 10px; padding-bottom: 60px; }
  .top-bar { display: flex; gap: 8px; align-items: center; margin-bottom: 10px; }
  #connectBtn { flex: 2; background: var(--primary); color: white; border: 2px solid white; padding: 12px; border-radius: 10px; font-weight: 900; font-size: 1rem; }
  #connectBtn.connected { background: #FFFFFF; color: #00C853; border: 2px solid #00C853; }
  #resetBtn { flex: 1; background: #333; color: white; border: none; padding: 12px; border-radius: 10px; font-weight: bold; font-size: 0.9rem; }
  #configToggle { flex: 0.6; background: #222; color: #AAA; border: 1px solid #444; padding: 12px; border-radius: 10px; font-size: 1rem; }
  .config-overlay { display: none; background: #1A1A1A; border-radius: 12px; padding: 15px; margin-top: 10px; border: 1px solid #444; text-align: left; }
  .config-overlay.open { display: block; }
  .config-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  .config-row label { font-size: 0.8rem; color: #CCC; }
  .config-row input, .config-row select { background: #000; color: #FFF; border: 1px solid #555; padding: 5px; border-radius: 4px; width: 75px; text-align: center; }
  .help-box { background: #FFEB3B; color: #000; padding: 12px; border-radius: 8px; font-size: 0.8rem; margin-top: 15px; line-height: 1.6; border: 2px solid var(--primary); font-weight: bold; }
  .main-panel { background: var(--panel-bg); color: var(--text-dark); border-radius: 15px; padding: 20px; box-shadow: 0 0 20px rgba(255,255,255,0.2); }
  .val-mega { font-size: 4.5rem; font-weight: 900; line-height: 1; display: block; margin: 5px 0; }
  .val-sub { font-size: 2.2rem; font-weight: 900; line-height: 1; display: block; }
  .chart-box { background: #FFF; margin-top: 10px; padding: 5px; border-radius: 10px; height: 160px; display: block; }
  #dirIndicator { font-size: 0.7rem; font-weight: bold; padding: 2px 6px; border-radius: 4px; margin-left: 10px; }
  .dir-up { background: var(--success); color: white; }
  .dir-down { background: #f44336; color: white; }
  .dir-idle { background: #444; color: #888; }
  .monitor-footer { position: fixed; bottom: 0; left: 0; right: 0; background: #111; border-top: 1px solid #333; padding: 8px 15px; font-family: monospace; font-size: 0.7rem; color: #00FF00; display: flex; justify-content: space-between; align-items: center; }
  .hidden { display: none !important; }
</style>
</head>
<body>
  <div class="header"><span class="title">VBT PRO v3.2</span><div><span id="dirIndicator" class="dir-idle">待機</span><span id="status" style="font-size:0.65rem; color:#666;">尚未連線</span></div></div>
  <div class="top-bar"><button id="connectBtn">連接感測器</button><button id="resetBtn">新組數</button><button id="configToggle">⚙️</button></div>

  <div id="configPanel" class="config-overlay">
    <div style="font-weight:bold; color:var(--warning); margin-bottom:12px;">系統設定</div>
    <div class="config-row"><label>語音模式</label><select id="cfgVoiceMode"><option value="none">關閉</option><option value="avg">平均</option><option value="peak">峰值</option><option value="both">兩者</option></select></div>
    <div class="config-row"><label>語音語速</label><input type="number" id="cfgVoiceRate" step="0.1"></div>
    <div class="config-row"><label>顯示即時波形</label><input type="checkbox" id="cfgShowWave" checked></div>
    <hr style="border:0; border-top:1px solid #333; margin:10px 0;">
    <div class="config-row"><label>啟動靈敏度(G)</label><input type="number" id="cfgStart" step="0.01"></div>
    <div class="config-row"><label>結束緩衝(幀)</label><input type="number" id="cfgEnd" step="1"></div>
    <div class="config-row"><label>最低有效速(m/s)</label><input type="number" id="cfgMinV" step="0.01"></div>
    <div style="display:flex; gap:8px;"><button onclick="saveSettings()" style="background:var(--warning); color:#000; flex:1; font-size:0.8rem; padding:10px;">儲存</button><button onclick="resetSettings()" style="background:#444; color:#FFF; flex:0.6; font-size:0.8rem; padding:10px;">預設</button></div>
    <div class="help-box">波形圖已設定為<b>持續保留</b>，直到下一次動作啟動才會重置。</div>
  </div>

  <div class="main-panel">
    <div style="border-bottom:2px solid #EEE; padding-bottom:10px;"><span id="repsText" class="val-mega">0</span><span style="font-size:0.8rem;color:#666;font-weight:bold;">REPS</span></div>
    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-top:10px;">
      <div><span id="avgText" class="val-sub" style="color:var(--success);">--</span><span style="font-size:0.7rem;color:#666;">AVG m/s</span></div>
      <div><span id="peakText" class="val-sub" style="color:var(--info);">--</span><span style="font-size:0.7rem;color:#666;">PEAK m/s</span></div>
    </div>
  </div>

  <!-- 單次波形圖：現在會保留直到下次啟動 -->
  <div id="waveBox" class="chart-box"><canvas id="waveChart"></canvas></div>
  <div class="chart-box"><canvas id="trendChart"></canvas></div>

  <div style="background:#222; padding:15px; border-radius:12px; margin-top:15px;">
    <input type="text" id="setNote" placeholder="輸入備註" style="width:100%; padding:12px; margin-bottom:10px; border-radius:8px; border:none; box-sizing:border-box;">
    <div style="display:flex; gap:10px;"><button id="saveBtn" style="background:var(--success); color:#FFF; flex:1;">儲存本組</button><button id="exportBtn" style="background:var(--info); color:#FFF; flex:0.4;">匯出</button></div>
  </div>

  <div style="margin-top:20px; text-align:left;"><h3 style="color:#FFF; font-size:1.1rem;">歷史紀錄</h3><div id="historyList"></div></div>
  <div class="monitor-footer"><div>RAW: <span id="rX">0.0</span>, <span id="rY">0.0</span>, <span id="rZ">0.0</span></div><div id="fpsDisplay">0 Hz</div></div>

<script>
const SERVICE_UUID = "19b10000-e8f2-537e-4f6c-d104768a1214", CHAR_UUID = "19b10001-e8f2-537e-4f6c-d104768a1214";
const DEFAULT_SETTINGS = { start: 0.10, dead: 0.07, end: 8, voiceMode: 'avg', voiceRate: 1.6, minV: 0.15, showWave: true };
let settings = {...DEFAULT_SETTINGS};

function loadSettings() { const saved = localStorage.getItem('vbt_settings'); if (saved) settings = {...DEFAULT_SETTINGS, ...JSON.parse(saved)}; applyToUI(); }
function applyToUI() { document.getElementById('cfgStart').value = settings.start; document.getElementById('cfgEnd').value = settings.end; document.getElementById('cfgVoiceMode').value = settings.voiceMode; document.getElementById('cfgVoiceRate').value = settings.voiceRate; document.getElementById('cfgMinV').value = settings.minV; document.getElementById('cfgShowWave').checked = settings.showWave; document.getElementById('waveBox').classList.toggle('hidden', !settings.showWave); }
function saveSettings() { settings.start = parseFloat(document.getElementById('cfgStart').value); settings.end = parseInt(document.getElementById('cfgEnd').value); settings.voiceMode = document.getElementById('cfgVoiceMode').value; settings.voiceRate = parseFloat(document.getElementById('cfgVoiceRate').value); settings.minV = parseFloat(document.getElementById('cfgMinV').value); settings.showWave = document.getElementById('cfgShowWave').checked; localStorage.setItem('vbt_settings', JSON.stringify(settings)); applyToUI(); document.getElementById('configPanel').classList.remove('open'); }
function resetSettings() { if(confirm('還原預設？')) { settings = {...DEFAULT_SETTINGS}; applyToUI(); localStorage.setItem('vbt_settings', JSON.stringify(settings)); } }
document.getElementById('configToggle').addEventListener('click', () => { document.getElementById('configPanel').classList.toggle('open'); });

function speak(text) { if (settings.voiceMode === 'none') return; window.speechSynthesis.cancel(); const msg = new SpeechSynthesisUtterance(text); msg.lang = 'zh-TW'; msg.rate = settings.voiceRate; window.speechSynthesis.speak(msg); }

const trendChart = new Chart(document.getElementById('trendChart').getContext('2d'), { type: 'line', data: { labels: [], datasets: [{ label: 'Avg', data: [], borderColor: '#008000', borderWidth: 3, tension: 0.2, fill: false }, { label: 'Peak', data: [], borderColor: '#0000FF', borderWidth: 3, tension: 0.2, fill: false }] }, options: { responsive: true, maintainAspectRatio: false, scales: { y: { beginAtZero: true, grid: { color: '#EEE' } } }, plugins: { legend: { display: false }, title: { display: true, text: '組數趨勢' } } } });
const waveChart = new Chart(document.getElementById('waveChart').getContext('2d'), { type: 'line', data: { labels: [], datasets: [{ data: [], borderColor: '#FF5200', borderWidth: 2, pointRadius: 0, fill: true, backgroundColor: 'rgba(255,82,0,0.1)' }] }, options: { responsive: true, maintainAspectRatio: false, scales: { y: { beginAtZero: true, grid: { color: '#EEE' } } }, plugins: { legend: { display: false }, title: { display: true, text: '單次速度波形 (保留中)' } }, animation: false } });

let gravityVec = {x:0, y:0, z:1}, gravityMag = 1.0, velocity = 0.0, maxVelocity = 0.0, velocities = [], state = 0, startTime = 0, calibBuffer = [], isCalibrated = false, currentSetData = [], lowVelocityCount = 0, packetCount = 0, lastFpsTime = Date.now(), lastPacketTime = Date.now();

function updateVBT(x, y, z) {
    lastPacketTime = Date.now(); packetCount++;
    document.getElementById('rX').innerText = x.toFixed(1); document.getElementById('rY').innerText = y.toFixed(1); document.getElementById('rZ').innerText = z.toFixed(1);
    if (Date.now() - lastFpsTime >= 1000) { document.getElementById('fpsDisplay').innerText = packetCount + " Hz"; packetCount = 0; lastFpsTime = Date.now(); }

    if (!isCalibrated) {
        calibBuffer.push({x, y, z});
        if (calibBuffer.length >= 100) {
            let sumX = calibBuffer.reduce((a,b)=>a+b.x, 0)/100, sumY = calibBuffer.reduce((a,b)=>a+b.y, 0)/100, sumZ = calibBuffer.reduce((a,b)=>a+b.z, 0)/100;
            gravityVec = {x: sumX, y: sumY, z: sumZ}; gravityMag = Math.sqrt(sumX**2 + sumY**2 + sumZ**2); isCalibrated = true; document.getElementById('status').innerText = '狀態：校準完成';
        }
        return null;
    }

    let dot = (x * gravityVec.x + y * gravityVec.y + z * gravityVec.z) / gravityMag;
    let netAccel = -(dot - gravityMag);
    const dirInd = document.getElementById('dirIndicator');
    if (netAccel > 0.05) { dirInd.innerText = "向上"; dirInd.className = "dir-up"; } else if (netAccel < -0.05) { dirInd.innerText = "向下"; dirInd.className = "dir-down"; } else { dirInd.innerText = "待機"; dirInd.className = "dir-idle"; }

    if (Math.abs(netAccel) < settings.dead) { netAccel = 0.0; if (state === 0) { velocity = 0.0; return null; } }
    velocity += netAccel * 9.81 * 0.01;

    if (state === 0 && netAccel > settings.start) {
        state = 1; startTime = Date.now(); velocities = []; maxVelocity = 0.0; lowVelocityCount = 0;
        // 關鍵優化：下一次動作正式啟動時，才清空上一次的波形
        waveChart.data.labels = []; waveChart.data.datasets[0].data = [];
        waveChart.options.plugins.title.text = "單次速度波形 (追蹤中...)";
        waveChart.update('none');
    } else if (state === 1 && velocity > 0.08) { state = 2; }
    else if (state === 2) {
        if (velocity > 0) {
            velocities.push(velocity); if (velocity > maxVelocity) maxVelocity = velocity; lowVelocityCount = 0;
            if (settings.showWave) { waveChart.data.labels.push(""); waveChart.data.datasets[0].data.push(velocity.toFixed(3)); waveChart.update('none'); }
        } else { lowVelocityCount++; }
        if ((velocity < 0.08 && velocities.length > 10 && lowVelocityCount > settings.end) || (Date.now() - startTime > 8000)) {
            state = 3;
            waveChart.options.plugins.title.text = "單次速度波形 (已保留)";
            waveChart.update();
        }
    } else if (state === 3) {
        let res = (velocities.length > 10 && maxVelocity > settings.minV) ? {avg: velocities.reduce((a, b) => a + b, 0) / velocities.length, peak: maxVelocity} : null;
        state = 0; velocity = 0.0; return res;
    }
    return null;
}

function addRepToUI(res) {
    currentSetData.push(res);
    document.getElementById('avgText').innerText = res.avg.toFixed(2); document.getElementById('peakText').innerText = res.peak.toFixed(2); document.getElementById('repsText').innerText = currentSetData.length;
    let t = (settings.voiceMode === 'avg') ? res.avg.toFixed(2) : (settings.voiceMode === 'peak') ? res.peak.toFixed(2) : (settings.voiceMode === 'both') ? `${res.avg.toFixed(2)}，${res.peak.toFixed(2)}` : "";
    if(t) speak(t);
    trendChart.data.labels.push(currentSetData.length); trendChart.data.datasets[0].data.push(res.avg.toFixed(2)); trendChart.data.datasets[1].data.push(res.peak.toFixed(2)); trendChart.update();
}

function renderHistory() {
    const history = JSON.parse(localStorage.getItem('vbt_history') || '[]');
    const container = document.getElementById('historyList');
    container.innerHTML = history.map((set, index) => `<div class="history-item"><div style="display:flex; justify-content:space-between;"><div style="flex:1;" onclick="toggleHistoryCard(${index})"><div style="font-weight:900; color:var(--primary); font-size:0.8rem;">${set.date}</div><div style="font-weight:bold; font-size:0.9rem; margin:3px 0;">${set.note || '無備註'}</div><div>${set.reps} 下 | 平均 ${(set.data.reduce((a,b)=>a+b.avg,0)/set.reps).toFixed(2)} m/s</div></div><button onclick="deleteHistory(event, ${index})" style="background:none; color:red; font-size:0.8rem; padding:10px;">刪除</button></div><div id="detail-${index}" style="display:none; height:150px; margin-top:10px;"><canvas id="chart-${index}"></canvas></div></div>`).join('');
    history.forEach((set, index) => setTimeout(() => {
        const c = document.getElementById(`chart-${index}`);
        if(c) {
            // 強制設定畫布父容器背景為白色
            c.parentElement.style.background = "#FFFFFF";
            c.parentElement.style.borderRadius = "8px";
            c.parentElement.style.padding = "5px";

            new Chart(c.getContext('2d'), { 
                type: 'line', 
                data: { 
                    labels: set.data.map((_,i)=>i+1), 
                    datasets: [
                        { label: '平均', data: set.data.map(d=>d.avg), borderColor: '#008000', borderWidth: 2, fill: false }, 
                        { label: '峰值', data: set.data.map(d=>d.peak), borderColor: '#0000FF', borderWidth: 2, fill: false }
                    ] 
                }, 
                options: { 
                    responsive: true, 
                    maintainAspectRatio: false, 
                    scales: { 
                        y: { beginAtZero: true, grid: { color: '#EEE' }, ticks: { color: '#333' } },
                        x: { grid: { display: false }, ticks: { color: '#333' } }
                    },
                    plugins: { legend: { display: false } } 
                } 
            });
        }
    }, 100));
    }

window.toggleHistoryCard = (i) => { const d = document.getElementById(`detail-${i}`); d.style.display = d.style.display === 'none' ? 'block' : 'none'; };
window.deleteHistory = (e, i) => { e.stopPropagation(); if(confirm('刪除？')) { const h = JSON.parse(localStorage.getItem('vbt_history') || '[]'); h.splice(i, 1); localStorage.setItem('vbt_history', JSON.stringify(h)); renderHistory(); } };

document.getElementById('saveBtn').addEventListener('click', () => { if (currentSetData.length === 0) return; const history = JSON.parse(localStorage.getItem('vbt_history') || '[]'); history.unshift({ date: new Date().toLocaleString('zh-TW'), reps: currentSetData.length, note: document.getElementById('setNote').value, data: [...currentSetData] }); localStorage.setItem('vbt_history', JSON.stringify(history.slice(0, 30))); document.getElementById('setNote').value = ''; renderHistory(); alert('儲存成功'); });
document.getElementById('resetBtn').addEventListener('click', () => { currentSetData = []; document.getElementById('repsText').innerText = "0"; document.getElementById('avgText').innerText = "--"; document.getElementById('peakText').innerText = "--"; trendChart.data.labels = []; trendChart.data.datasets.forEach(d => d.data = []); trendChart.update(); });
document.getElementById('exportBtn').addEventListener('click', () => { const history = JSON.parse(localStorage.getItem('vbt_history') || '[]'); if (history.length === 0) return; let csv = "\uFEFF日期,備註,次數,平均,峰值\n"; history.forEach(s => s.data.forEach((d,i)=>csv+=`${s.date},${s.note||''},${i+1},${d.avg.toFixed(2)},${d.peak.toFixed(2)}\n`)); const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' }); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download=`VBT_${Date.now()}.csv`; document.body.appendChild(a); a.click(); document.body.removeChild(a); });

setInterval(() => { if (document.getElementById('connectBtn').classList.contains('connected') && (Date.now() - lastPacketTime > 1500)) forceDisconnect(); }, 500);
function forceDisconnect() { const btn = document.getElementById('connectBtn'); btn.classList.remove('connected'); btn.innerText = '連接感測器'; document.getElementById('status').innerText = '狀態：偵測到斷線。'; document.getElementById('dirIndicator').className = "dir-idle"; }

document.getElementById('connectBtn').addEventListener('click', async () => {
    try {
        const device = await navigator.bluetooth.requestDevice({ filters: [{ name: 'Nano33_Motion' }], optionalServices: [SERVICE_UUID] });
        const server = await device.gatt.connect();
        const service = await server.getPrimaryService(SERVICE_UUID);
        const characteristic = await service.getCharacteristic(CHAR_UUID);
        await characteristic.startNotifications();
        document.getElementById('connectBtn').classList.add('connected'); document.getElementById('connectBtn').innerText = '已連線';
        characteristic.addEventListener('characteristicvaluechanged', (e) => {
            let parts = new TextDecoder('utf-8').decode(e.target.value).split(',');
            if (parts.length === 3) { let res = updateVBT(parseFloat(parts[0]), parseFloat(parts[1]), parseFloat(parts[2])); if (res) addRepToUI(res); }
        });
    } catch (e) { alert(e); }
});
loadSettings(); renderHistory();
</script>
</body>
</html>
